<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° View — Edelhaus Automotive</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Three.js via importmap -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <style>
        :root {
            /* ── Edelhaus Showroom Palette — electric blue ── */
            --gold:        #3498db;
            --gold-light:  #5dade2;
            --gold-glow:   rgba(52,152,219,0.40);
            --warm:        #2980b9;
            --bronze:      #8a6420;
            --dark:        #0e0c09;
            --dark-2:      #161208;
            --dark-3:      #1c1610;
            --dark-4:      #221a0c;
            --border:      rgba(52,152,219,0.12);
            --border-gold: rgba(52,152,219,0.40);
            --light:       #f5efe0;
            --muted:       #7a6e58;
            /* --blue alias */
            --blue:        #3498db;
            --blue-glow:   rgba(200,168,75,0.35);
            --border-blue: rgba(200,168,75,0.35);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--dark);
            color: var(--light);
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ──── TOP NAV ──── */
        .viewer-nav {
            position: relative;
            z-index: 200;
            height: 56px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1.75rem;
            background: rgba(14,12,9,0.97);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(24px);
        }
        .nav-brand {
            font-family: 'Cinzel', serif;
            font-size: 0.88rem;
            letter-spacing: 4px;
            color: var(--gold);
            text-decoration: none;
        }
        .nav-center {
            font-size: 0.68rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .nav-center .badge-3d {
            background: rgba(52,152,219,0.12);
            border: 1px solid rgba(52,152,219,0.38);
            color: var(--gold);
            font-size: 0.6rem;
            letter-spacing: 2px;
            padding: 2px 8px;
            border-radius: 3px;
        }
        .btn-nav {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: none;
            border: 1px solid var(--border);
            color: #888;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 0.38rem 0.9rem;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
        }
        .btn-nav:hover { color: #fff; border-color: var(--border-gold); background: rgba(52,152,219,0.10); }
        .btn-nav i { font-size: 0.85rem; }

        /* ──── CAR INFO BAR ──── */
        .car-info-bar {
            flex-shrink: 0;
            background: rgba(22,18,8,0.96);
            border-bottom: 1px solid var(--border);
            padding: 0.7rem 1.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            backdrop-filter: blur(12px);
        }
        .car-brand-label {
            font-size: 0.6rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 2px;
        }
        .car-full-name {
            font-family: 'Cinzel', serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: #fff;
        }
        .car-subtitle-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.88rem;
            color: var(--muted);
            font-style: italic;
        }
        .price-main {
            font-family: 'Cinzel', serif;
            font-size: 1.1rem;
            color: #fff;
            letter-spacing: 1px;
            text-align: right;
        }
        .price-usd {
            font-size: 0.68rem;
            color: var(--muted);
            letter-spacing: 1px;
            margin-top: 2px;
            text-align: right;
        }
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border: 1px solid rgba(46,204,113,0.4);
            background: rgba(46,204,113,0.1);
            color: #2ecc71;
        }

        /* ──── MAIN STAGE — warm beige showroom floor ──── */
        .stage {
            flex: 1;
            position: relative;
            overflow: hidden;
            background: linear-gradient(
                180deg,
                #888888 0%,
                #cdc0ae 28%,
                #ddd4c2 55%,
                #e0d6c4 72%,
                #cfc3b0 100%
            );
        }
        /* Subtle edge vignette */
        .stage::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(
                ellipse at 50% 48%,
                transparent 35%,
                rgba(60,45,25,0.22) 100%
            );
            z-index: 1;
            pointer-events: none;
        }
        /* Canvas above overlay */
        #threeCanvas { z-index: 2; background: transparent !important; }
                #threeCanvas.dragging { cursor: grabbing; }

        /* Stage corner decorations */
        .corner-mark {
            position: absolute;
            width: 28px;
            height: 28px;
            pointer-events: none;
            z-index: 5;
        }
        .corner-mark::before, .corner-mark::after { content: ''; position: absolute; background: rgba(100,80,30,0.45); }
        .corner-mark::before { width: 2px; height: 100%; }
        .corner-mark::after  { width: 100%; height: 2px; }
        .cm-tl { top: 14px; left: 14px; }
        .cm-tr { top: 14px; right: 14px; transform: scaleX(-1); }
        .cm-bl { bottom: 14px; left: 14px; transform: scaleY(-1); }
        .cm-br { bottom: 14px; right: 14px; transform: scale(-1); }

        /* 360 badge */
        .badge-360 {
            position: absolute;
            top: 1rem; left: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(52,152,219,0.12);
            border: 1px solid rgba(200,168,75,0.42);
            border-radius: 5px;
            padding: 5px 12px;
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gold);
            pointer-events: none;
            z-index: 10;
        }
        .badge-360 .spin-icon {
            font-size: 0.9rem;
            animation: spin-cont 3s linear infinite;
        }
        @keyframes spin-cont { to { transform: rotate(360deg); } }

        /* Drag hint */
        .drag-hint {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            pointer-events: none;
            transition: opacity 0.8s;
        }
        .drag-hint.hidden { opacity: 0; }
        .drag-hint-icon {
            font-size: 2.2rem;
            color: rgba(40,30,10,0.45);
            margin-bottom: 0.5rem;
            animation: drag-hint-anim 2.2s ease-in-out infinite;
        }
        @keyframes drag-hint-anim {
            0%, 100% { transform: translateX(0); opacity: 0.45; }
            30%  { transform: translateX(-14px); opacity: 0.85; }
            70%  { transform: translateX(14px); opacity: 0.85; }
        }
        .drag-hint-text {
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(40,30,10,0.55);
        }

        /* Loading overlay */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg,#1a1408 0%,#0e0c09 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.6s, visibility 0.6s;
        }
        .loading-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .loading-ring {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(200,168,75,0.15);
            border-top-color: var(--gold);
            animation: ring-spin 0.9s linear infinite;
            margin-bottom: 1.1rem;
        }
        @keyframes ring-spin { to { transform: rotate(360deg); } }
        .loading-label {
            font-size: 0.65rem;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            color: var(--muted);
        }
        .loading-progress {
            margin-top: 0.8rem;
            width: 150px;
            height: 2px;
            background: rgba(255,255,255,0.05);
            border-radius: 1px;
            overflow: hidden;
        }
        .loading-bar {
            height: 100%;
            background: linear-gradient(to right, var(--gold), var(--gold-light));
            border-radius: 1px;
            transition: width 0.2s;
            width: 0%;
        }

        /* Floor reflection line */
        .floor-reflect {
            position: absolute;
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            width: 55%;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(100,80,30,0.30), transparent);
            pointer-events: none;
            z-index: 2;
        }

        /* Angle compass */
        .compass {
            position: absolute;
            bottom: 1.2rem;
            right: 1.2rem;
            width: 48px;
            height: 48px;
            z-index: 10;
            pointer-events: none;
        }
        .compass-ring {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(200,168,75,0.30);
            background: rgba(14,12,9,0.88);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .compass-needle {
            position: absolute;
            width: 2px;
            height: 16px;
            background: linear-gradient(to bottom, var(--gold), transparent);
            top: 5px; left: 50%;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(0deg);
            border-radius: 1px;
        }
        .compass-dot {
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 8px rgba(200,168,75,0.7);
        }
        .compass-angle {
            position: absolute;
            bottom: -17px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.55rem;
            letter-spacing: 1px;
            color: var(--muted);
            white-space: nowrap;
        }

        /* ──── CONTROLS BAR ──── */
        .controls-bar {
            flex-shrink: 0;
            background: rgba(22,18,8,0.97);
            border-top: 1px solid var(--border);
            padding: 0.7rem 1.75rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .ctrl-group { display: flex; align-items: center; gap: 0.5rem; }
        .ctrl-btn {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: rgba(28,22,12,0.95);
            border: 1px solid var(--border);
            color: #888;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.68rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 0.45rem 0.9rem;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .ctrl-btn:hover { color: #fff; border-color: var(--border-gold); background: rgba(52,152,219,0.10); }
        .ctrl-btn.active { color: var(--gold); border-color: rgba(52,152,219,0.55); background: rgba(52,152,219,0.12); }
        .ctrl-btn i { font-size: 0.85rem; }
        .ctrl-btn.spinning i { animation: spin-cont 1.4s linear infinite; }

        .speed-label {
            font-size: 0.62rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            white-space: nowrap;
        }
        .speed-slider {
            -webkit-appearance: none;
            width: 90px; height: 3px;
            background: rgba(200,168,75,0.15);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 13px; height: 13px;
            border-radius: 50%;
            background: var(--gold);
            box-shadow: 0 0 8px var(--gold-glow);
            cursor: pointer;
        }

        /* ──── COLOR BAR ──── */
        .color-bar {
            flex-shrink: 0;
            background: rgba(28,22,12,0.97);
            border-top: 1px solid var(--border);
            padding: 0.6rem 1.75rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            overflow-x: auto;
        }
        .color-bar::-webkit-scrollbar { display: none; }
        .color-bar-label {
            font-size: 0.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .color-swatch-btn {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            cursor: pointer;
            padding: 0.3rem 0.7rem;
            border-radius: 5px;
            border: 1px solid transparent;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .color-swatch-btn:hover { border-color: var(--border-gold); background: rgba(52,152,219,0.08); }
        .color-swatch-btn.active { border-color: rgba(200,168,75,0.60); background: rgba(52,152,219,0.12); }
        .swatch-circle {
            width: 19px; height: 19px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.14);
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.4);
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .color-swatch-btn.active .swatch-circle { transform: scale(1.22); border-color: rgba(200,168,75,0.80); }
        .swatch-name { font-size: 0.68rem; letter-spacing: 1px; color: #888; white-space: nowrap; }
        .color-swatch-btn.active .swatch-name { color: #fff; }

        /* ──── SPECS SIDE PANEL ──── */
        .specs-panel {
            position: absolute;
            top: 0; right: 0; bottom: 0;
            width: 260px;
            background: rgba(18,14,6,0.96);
            border-left: 1px solid var(--border);
            backdrop-filter: blur(24px);
            z-index: 55;
            transform: translateX(100%);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .specs-panel.open { transform: translateX(0); }
        .specs-header {
            padding: 1.1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .specs-header-title {
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
        }
        .specs-close {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
            transition: color 0.2s;
        }
        .specs-close:hover { color: #fff; }
        .specs-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.75rem 1.25rem;
        }
        .specs-list::-webkit-scrollbar { width: 3px; }
        .specs-list::-webkit-scrollbar-track { background: transparent; }
        .specs-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
        .spec-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.55rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .spec-row:last-child { border-bottom: none; }
        .spec-label { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.5px; }
        .spec-value { font-size: 0.75rem; color: #ddd; font-weight: 600; text-align: right; max-width: 55%; }
        .spec-highlights {
            padding: 0.75rem 1.25rem;
            border-top: 1px solid var(--border);
        }
        .spec-highlights-title {
            font-size: 0.58rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.6rem;
        }
        .highlight-pill {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid rgba(200,168,75,0.28);
            background: rgba(52,152,219,0.08);
            color: #aaa;
            font-size: 0.65rem;
            margin: 0.2rem 0.2rem 0.2rem 0;
        }

        /* ──── CAMERA PRESETS ──── */
        .camera-presets {
            position: absolute;
            left: 1rem;
            bottom: 5rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            z-index: 10;
        }
        .preset-btn {
            background: rgba(20,16,8,0.75);
            border: 1px solid rgba(200,168,75,0.25);
            color: #777;
            font-size: 0.6rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 0.35rem 0.7rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Montserrat', sans-serif;
            white-space: nowrap;
        }
        .preset-btn:hover { color: #fff; border-color: var(--border-gold); background: rgba(52,152,219,0.12); }

        /* ──── ERROR STATE ──── */
        .error-state {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 90;
            gap: 0.75rem;
        }
        .error-state.show { display: flex; }
        .error-icon { font-size: 2rem; color: #555; }
        .error-text { font-size: 0.72rem; letter-spacing: 2px; color: rgba(60,45,20,0.7); text-align: center; text-transform: uppercase; }

        /* ──── FULLSCREEN ──── */
        .fullscreen-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(20,16,8,0.70);
            border: 1px solid rgba(200,168,75,0.30);
            color: #ccc;
            width: 32px; height: 32px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }
        .fullscreen-btn:hover { color: #fff; border-color: var(--border-gold); }

        /* Responsive */
        @media (max-width: 640px) {
            .car-info-bar { flex-wrap: wrap; }
            .controls-bar { padding: 0.6rem 1rem; }
            .camera-presets { display: none; }
        }
    </style>
</head>
<body>

<!-- ── TOP NAV ── -->
<nav class="viewer-nav">
    <a class="nav-brand" href="help.html" style="color:var(--gold);letter-spacing:5px;font-weight:700;">EDELHAUS</a>
    <div class="nav-center">
        <span style="color:var(--muted)">360° Studio</span>
        <span class="badge-3d" style="background:rgba(52,152,219,0.10);border-color:rgba(52,152,219,0.38);color:var(--gold)">3D · Live</span>
    </div>
    <div style="display:flex;gap:0.5rem;align-items:center">
        <button class="btn-nav" id="btnSpecs" onclick="toggleSpecs()">
            <i class="bi bi-list-ul"></i> Specs
        </button>
        <a class="btn-nav" id="backBtn" href="car-detail.html">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>
</nav>

<!-- ── CAR INFO BAR ── -->
<div class="car-info-bar">
    <div>
        <div class="car-brand-label" id="carBrandLabel">EDELHAUS</div>
        <div class="car-full-name" id="carNameLabel">Loading…</div>
        <div class="car-subtitle-text" id="carSubtitleLabel"></div>
    </div>
    <div style="display:flex;align-items:center;gap:1rem">
        <div>
            <div class="price-main" id="carPriceLabel">—</div>
            <div class="price-usd" id="carPriceUSD"></div>
        </div>
        <div class="status-pill" id="statusPill">
            <span style="width:5px;height:5px;border-radius:50%;background:currentColor;box-shadow:0 0 6px currentColor;display:inline-block"></span>
            <span id="statusText">Available</span>
        </div>
    </div>
</div>

<!-- ── MAIN 3D STAGE ── -->
<div class="stage" id="stage">

    <canvas id="threeCanvas"></canvas>

    <!-- corner decorations -->
    <div class="corner-mark cm-tl"></div>
    <div class="corner-mark cm-tr"></div>
    <div class="corner-mark cm-bl"></div>
    <div class="corner-mark cm-br"></div>
    <div class="floor-reflect"></div>

    <!-- 360 badge -->
    <div class="badge-360">
        <i class="bi bi-arrow-repeat spin-icon"></i>
        360° · 3D
    </div>

    <!-- Full-screen button -->
    <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Fullscreen">
        <i class="bi bi-fullscreen" id="fsIcon"></i>
    </button>

    <!-- Drag hint -->
    <div class="drag-hint" id="dragHint">
        <div class="drag-hint-icon"><i class="bi bi-arrows-move"></i></div>
        <div class="drag-hint-text">Drag to rotate · Scroll to zoom</div>
    </div>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div style="font-family:'Cinzel',serif;font-size:1.1rem;letter-spacing:6px;color:var(--gold);margin-bottom:1.8rem;text-transform:uppercase;opacity:0.9;">EDELHAUS</div>
        <div class="loading-ring"></div>
        <div class="loading-label" style="color:var(--muted);margin-top:0.6rem;">Loading 3D Model</div>
        <div class="loading-progress">
            <div class="loading-bar" id="loadingBar"></div>
        </div>
        <div style="font-size:0.55rem;letter-spacing:3px;color:rgba(200,168,75,0.35);margin-top:1.2rem;text-transform:uppercase;">Automotive Excellence</div>
    </div>

    <!-- Error state -->
    <div class="error-state" id="errorState">

<!-- THREE.JS VIEWER ENGINE               -->
<!-- ══════════════════════════════════════ -->
<script type="module">
import * as THREE          from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }     from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader }    from 'three/addons/loaders/DRACOLoader.js';
import { RGBELoader }     from 'three/addons/loaders/RGBELoader.js';

// ── State
let scene, camera, renderer, controls;
let carModel      = null;
let brandGroup    = null;     // rotates with car — holds EDELHAUS text arcs
let bodyMeshes    = [];
let trimMeshes    = [];
let glassMeshes   = [];
let isAutoRotating  = false;
let specsOpen       = false;
let carData         = null;
let currentPaintHex = '#cc2200';

// ── Boot
window.addEventListener('DOMContentLoaded', () => {
    initThree();
    animate();
    window.addEventListener('resize', onResize);
    loadCarData();
});

// ════════════════════════════════════════
//  DATA
// ════════════════════════════════════════
async function loadCarData() {
    const params = new URLSearchParams(window.location.search);
    const carId  = parseInt(params.get('id') || '1');

    let car = null;

    // 1. localStorage cache (set by car-detail.html)
    try {
        const c = JSON.parse(localStorage.getItem('edelhausDetailCar') || '{}');
        if (c && c.id === carId) car = c;
    } catch(e) {}

    // 2. Flask API
    if (!car) {
        try {
            const r = await fetch(`http://localhost:5000/api/cars/${carId}`);
            if (r.ok) car = await r.json();
        } catch(e) {}
    }

    // 3. cars.json
    if (!car) {
        try {
            const r = await fetch('cars.json');
            const list = await r.json();
            car = list.find(c => c.id === carId) || list[0];
        } catch(e) {}
    }

    // 4. Demo fallback
    if (!car) car = demoCarData();

    applyCarData(car);
}

function applyCarData(c) {
    carData = c;

    // ── Info bar
    document.getElementById('carBrandLabel').textContent    = (c.brand || 'Edelhaus').toUpperCase() + ' · EDELHAUS';
    document.getElementById('carNameLabel').textContent     = c.name  || 'Luxury Vehicle';
    document.getElementById('carSubtitleLabel').textContent = c.subtitle || '';
    document.getElementById('carPriceLabel').textContent    = c.price || '—';
    document.getElementById('carPriceUSD').textContent      = c.price_usd ? `≈ USD $${c.price_usd.toLocaleString()}` : '';
    document.getElementById('statusText').textContent       = c.status || 'Available';
    document.getElementById('backBtn').href                 = `car-detail.html?id=${c.id}`;

    const pill = document.getElementById('statusPill');
    const s = (c.status || '').toLowerCase();
    if (s.includes('sold'))
        pill.style.cssText = 'display:inline-flex;align-items:center;gap:6px;padding:3px 12px;border-radius:20px;font-size:.65rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:1px solid rgba(231,76,60,0.4);background:rgba(231,76,60,0.1);color:#e74c3c';
    else if (s.includes('reserved'))
        pill.style.cssText = 'display:inline-flex;align-items:center;gap:6px;padding:3px 12px;border-radius:20px;font-size:.65rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;border:1px solid rgba(241,196,15,0.4);background:rgba(241,196,15,0.1);color:#f1c40f';

    buildColorBar(c.colors || []);
    buildSpecs(c);

    // Primary paint colour from cars.json
    currentPaintHex = (c.colors && c.colors.length) ? c.colors[0].hex : '#cc2200';

    // Remove old model and build fresh one for this car
    if (carModel) { scene.remove(carModel); carModel = null; bodyMeshes = []; trimMeshes = []; glassMeshes = []; }

    // Add rotating brand text behind car
    addRotatingBrandText();

    loadModel(c);
}

// ════════════════════════════════════════
//  THREE.JS SETUP
// ════════════════════════════════════════
function initThree() {
    const canvas = document.getElementById('threeCanvas');
    const stage  = document.getElementById('stage');

    // ── Renderer — physically correct, high quality
    renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(stage.clientWidth, stage.clientHeight);
    renderer.shadowMap.enabled   = true;
    renderer.shadowMap.type      = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace    = THREE.SRGBColorSpace;
    renderer.toneMapping         = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    renderer.physicallyCorrectLights = true;

    // ── Scene
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xd8cebe); // warm beige showroom floor
    scene.fog = new THREE.Fog(0xd8cebe, 18, 40); // soft fade at edges

    // ── Camera
    camera = new THREE.PerspectiveCamera(42, stage.clientWidth / stage.clientHeight, 0.05, 300);
    camera.position.set(7.0, 3.2, 7.0);

    // ── HDR Environment Map — loaded from Three.js CDN for realistic car reflections
    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    pmremGenerator.compileEquirectangularShader();
    new RGBELoader()
        .setPath('https://threejs.org/examples/textures/equirectangular/')
        .load('venice_sunset_1k.hdr', (hdrTexture) => {
            hdrTexture.mapping = THREE.EquirectangularReflectionMapping;
            const envMap = pmremGenerator.fromEquirectangular(hdrTexture).texture;
            scene.environment = envMap;
            // Don't set scene.background — keep dark background, only use for reflections
            hdrTexture.dispose();
            pmremGenerator.dispose();
        });

    // ── STUDIO LIGHTING — bright, multi-directional showroom setup
    // Strong ambient so textures are visible from all angles
    scene.add(new THREE.AmbientLight(0xfff8f0, 2.8));

    // Key light — front top left (warm)
    const key = new THREE.DirectionalLight(0xfff5e8, 3.2);
    key.position.set(-8, 14, 10);
    key.castShadow = true;
    key.shadow.mapSize.set(4096, 4096);
    key.shadow.camera.left   = -15;
    key.shadow.camera.right  =  15;
    key.shadow.camera.top    =  15;
    key.shadow.camera.bottom = -15;
    key.shadow.camera.near   = 1;
    key.shadow.camera.far    = 40;
    key.shadow.bias = -0.0005;
    scene.add(key);

    // Fill light — right side (cool blue)
    const fill = new THREE.DirectionalLight(0xffe8c0, 2.0);
    fill.position.set(10, 8, -6);
    scene.add(fill);

    // Rim light — back (blue accent)
    const rim = new THREE.DirectionalLight(0xd4a020, 1.8);
    rim.position.set(0, 10, -14);
    scene.add(rim);

    // Front fill — makes sure front of car is lit
    const front = new THREE.DirectionalLight(0xfff5e0, 1.8);
    front.position.set(0, 5, 15);
    scene.add(front);

    // Under-car blue glow
    const under = new THREE.PointLight(0xd4a840, 0.6, 10);
    under.position.set(0, -0.3, 0);
    scene.add(under);

    // Top overhead soft box
    const top = new THREE.PointLight(0xfff8e8, 2.2, 28);
    top.position.set(0, 12, 0);
    scene.add(top);

    // Brand text added per-car in loadModel — rotates with vehicle

    // ── Floor — dark reflective studio
    const floor = new THREE.Mesh(
        new THREE.CircleGeometry(22, 128),
        new THREE.MeshStandardMaterial({
            color: 0xc8b898,
            roughness: 0.65,
            metalness: 0.02,
            envMapIntensity: 0.8,
        })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // ── Glow ring under car
    const ring = new THREE.Mesh(
        new THREE.RingGeometry(3.2, 3.5, 128),
        new THREE.MeshBasicMaterial({
            color: 0x3498db,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.35
        })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.005;
    scene.add(ring);

    // Inner soft glow
    const innerGlow = new THREE.Mesh(
        new THREE.CircleGeometry(3.0, 128),
        new THREE.MeshBasicMaterial({
            color: 0x3498db,
            transparent: true,
            opacity: 0.12
        })
    );
    innerGlow.rotation.x = -Math.PI / 2;
    innerGlow.position.y = 0.004;
    scene.add(innerGlow);

    // ── OrbitControls
    controls = new OrbitControls(camera, canvas);
    controls.enableDamping   = true;
    controls.dampingFactor   = 0.06;
    controls.enablePan       = false;
    controls.minDistance     = 4;
    controls.maxDistance     = 22;
    controls.minPolarAngle   = 0.12;
    controls.maxPolarAngle   = Math.PI / 2 - 0.02;
    controls.autoRotate      = false;
    controls.autoRotateSpeed = 1.2;
    controls.target.set(0, 1.0, 0);

    controls.addEventListener('start', () => {
        document.getElementById('dragHint').classList.add('hidden');
        if (isAutoRotating) stopAutoRotate();
    });
}

// ════════════════════════════════════════
//  ROTATING BRAND TEXT
//  Creates EDELHAUS + AUTOMOTIVE as a
//  large 3D plane that is parented to
//  a group which auto-rotates in sync
//  with OrbitControls so it always faces
//  behind the car as it spins.
// ════════════════════════════════════════
function addRotatingBrandText() {
    // Remove old brand group if exists
    if (brandGroup) { scene.remove(brandGroup); brandGroup = null; }

    brandGroup = new THREE.Group();

    // ── Canvas texture — big crisp text
    const cvs = document.createElement('canvas');
    cvs.width  = 4096;
    cvs.height = 768;
    const ctx  = cvs.getContext('2d');

    // Fully transparent background — no box
    ctx.clearRect(0, 0, 4096, 768);

    // ── EDELHAUS — massive, bold, slightly transparent white/gold
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    // Outer glow pass
    ctx.shadowColor   = 'rgba(200,168,75,0.25)';
    ctx.shadowBlur    = 40;
    ctx.fillStyle     = 'rgba(255,248,230,0.22)';
    ctx.font          = 'bold 310px "Arial Black", Arial, sans-serif';
    ctx.letterSpacing = '12px';
    ctx.fillText('EDELHAUS', 2048, 280);

    // Sharp pass
    ctx.shadowBlur    = 0;
    ctx.fillStyle     = 'rgba(255,248,220,0.18)';
    ctx.fillText('EDELHAUS', 2048, 280);

    // ── Thin gold separator line
    ctx.strokeStyle   = 'rgba(200,168,75,0.35)';
    ctx.lineWidth     = 2;
    ctx.beginPath();
    ctx.moveTo(300, 470); ctx.lineTo(3796, 470);
    ctx.stroke();

    // ── AUTOMOTIVE — smaller, spaced
    ctx.fillStyle     = 'rgba(220,200,150,0.16)';
    ctx.font          = '500 115px "Arial", sans-serif';
    ctx.letterSpacing = '28px';
    ctx.fillText('AUTOMOTIVE', 2048, 590);

    const tex = new THREE.CanvasTexture(cvs);
    tex.needsUpdate = true;

    // ── Plane sized to match canvas aspect ratio
    // Wide banner behind and slightly above the car
    const plane = new THREE.Mesh(
        new THREE.PlaneGeometry(26, 5),
        new THREE.MeshBasicMaterial({
            map:         tex,
            transparent: true,
            depthWrite:  false,
            side:        THREE.DoubleSide,
            opacity:     1.0,
        })
    );

    // Position: behind car, at windscreen height
    plane.position.set(0, 2.2, -7.5);
    brandGroup.add(plane);

    scene.add(brandGroup);
    return brandGroup;
}

// ════════════════════════════════════════
//  CAR MODEL SYSTEM
//  Priority order:
//  1. car.model_url (local GLB you downloaded)
//  2. Three.js Ferrari GLB (Ferrari brand only)
//  3. Procedural shape (category-based fallback)
// ════════════════════════════════════════

// ── GLB filename map: car id → local GLB file
const LOCAL_GLB_MAP = {
    2:  '2020_mercedes-benz_g-class_amg_g_63.glb',       // Mercedes AMG G63
    9:  '2023_lamborghini_urus_performante.glb',          // Lamborghini Urus Performante
    12: 'porsche_911_gt3.glb',                            // Porsche 911 GT3
    27: '2016_mansory_mercedes-amg_gt_s.glb',             // Mansory Mercedes-AMG GT S
    37: '2021_ferrari_sf90_spider.glb',                   // Ferrari SF90 Spider
};

function loadModel(car) {
    const bar   = document.getElementById('loadingBar');
    const label = document.querySelector('.loading-label');
    label.textContent = `Loading ${(car && car.name) ? car.name : '3D Model'}…`;
    bar.style.width   = '10%';

    const brand    = (car.brand   || '').toLowerCase();
    const category = (car.category || 'sports').toLowerCase();
    const carId    = car.id;

    // ── Path 1: Known local GLB by car ID (G63 or SF90)
    if (LOCAL_GLB_MAP[carId]) {
        loadGLB(LOCAL_GLB_MAP[carId], car, bar, () => buildProceduralCar(car, category, bar));
        return;
    }

    // ── Path 2: model_url field in car data (other cars with downloaded GLBs)
    const localGLB = car.model_url || null;
    if (localGLB) {
        loadGLB(localGLB, car, bar, () => buildProceduralCar(car, category, bar));
        return;
    }

    // ── Path 3: Ferrari brand → use free Three.js Ferrari GLB
    if (brand.includes('ferrari')) {
        loadGLB('https://threejs.org/examples/models/gltf/ferrari.glb', car, bar,
                () => buildProceduralCar(car, category, bar));
        return;
    }

    // ── Path 4: No GLB → procedural model
    buildProceduralCar(car, category, bar);
}

// ── Per-model tweaks: rotation + camera target height + scale override
// camDist = how far camera sits,  camY = camera height,  targetY = orbit target height
// scaleTarget = force model to this size (overrides auto 6.0)
const GLB_TWEAKS = {
    '2020_mercedes-benz_g-class_amg_g_63.glb':  { rotY: Math.PI,     targetY: 1.4, camY: 3.5, camDist: 9.0  },
    '2023_lamborghini_urus_performante.glb':     { rotY: Math.PI,     targetY: 1.2, camY: 3.2, camDist: 9.5  },
    'porsche_911_gt3.glb':                       { rotY: Math.PI,     targetY: 0.7, camY: 2.4, camDist: 7.5  },
    '2016_mansory_mercedes-amg_gt_s.glb':        { rotY: Math.PI,     targetY: 0.8, camY: 2.6, camDist: 8.0  },
    '2021_ferrari_sf90_spider.glb':              { rotY: Math.PI,     targetY: 0.9, camY: 2.8, camDist: 8.0  },
};

// ── Generic GLB loader — preserves original textures, only classifies for paint recolor
function loadGLB(url, car, bar, onFail) {
    const loader = new GLTFLoader();
    const draco  = new DRACOLoader();
    draco.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');
    loader.setDRACOLoader(draco);

    loader.load(url,
        (gltf) => {
            carModel = gltf.scene;
            bodyMeshes = []; trimMeshes = []; glassMeshes = [];

            // ── 1. Auto-fit: scale so longest axis = 6 units
            const box    = new THREE.Box3().setFromObject(carModel);
            const size   = box.getSize(new THREE.Vector3());
            const centre = box.getCenter(new THREE.Vector3());
            const longest = Math.max(size.x, size.y, size.z);
            const scale  = 6.0 / longest;
            carModel.scale.setScalar(scale);

            // ── 2. Centre horizontally, sit on floor
            carModel.position.set(
                -centre.x * scale,
                -box.min.y * scale,
                -centre.z * scale
            );

            // ── 3. Apply per-model rotation & camera tweaks
            const fname = url.split('/').pop();
            const tweak = GLB_TWEAKS[fname];
            if (tweak) {
                carModel.rotation.y = tweak.rotY || 0;
                // Move camera to best view distance for this model
                const d = tweak.camDist || 9;
                camera.position.set(d * 0.707, tweak.camY || 3.0, d * 0.707);
                controls.target.set(0, tweak.targetY || 1.0, 0);
                controls.update();
            }

            // ── 4. Enable shadows + boost env map on ALL meshes
            //    Preserve original textures — only tag body panels for paint recolor
            carModel.traverse(child => {
                if (!child.isMesh) return;
                child.castShadow    = true;
                child.receiveShadow = true;

                const mats = Array.isArray(child.material) ? child.material : [child.material];
                mats.forEach((mat, mi) => {
                    if (!mat) return;

                    // Boost env map so reflections show on all materials
                    mat.envMapIntensity = 1.8;
                    mat.needsUpdate = true;

                    // Classify mesh type by material properties
                    const col = mat.color;
                    if (!col) return;

                    const isGlass  = mat.transparent && mat.opacity < 0.80;
                    const isRubber = col.r < 0.08 && col.g < 0.08 && col.b < 0.08
                                     && (mat.roughness || 0) > 0.55;
                    // Chrome/bright trim
                    const isChrome = col.r > 0.65 && col.g > 0.65 && col.b > 0.65
                                     && (mat.metalness || 0) > 0.55;
                    // Body paint: mid-tone, not glass, not rubber, not chrome
                    const isBody   = !isGlass && !isRubber && !isChrome;

                    if (isGlass) {
                        // Make glass look better
                        mat.transparent = true;
                        mat.opacity     = Math.max(mat.opacity, 0.18);
                        mat.roughness   = 0.02;
                        mat.metalness   = 0.05;
                        glassMeshes.push(mat);
                        return;
                    }

                    if (isRubber) return; // keep tyres exactly as-is

                    // Clone mat so we don't corrupt the original asset
                    const cloned = mat.clone();
                    cloned._origColor = cloned.color.clone();

                    if (isChrome) {
                        cloned.metalness = 0.98;
                        cloned.roughness = 0.03;
                        cloned.envMapIntensity = 2.5;
                        trimMeshes.push(cloned);
                    } else if (isBody) {
                        // Slightly enhance body paint — keep hue from original
                        cloned.metalness = Math.max(cloned.metalness || 0, 0.45);
                        cloned.roughness = Math.min(cloned.roughness || 0.3, 0.32);
                        cloned.envMapIntensity = 2.0;
                        bodyMeshes.push(cloned);
                    }

                    // Swap in the cloned material
                    if (Array.isArray(child.material)) {
                        child.material = child.material.map((m, i) => i === mi ? cloned : m);
                    } else {
                        child.material = cloned;
                    }
                });
            });

            scene.add(carModel);

            // Apply initial paint colour if colors defined
            if (car.colors && car.colors.length) {
                applyRealisticPaint(car.colors[0].hex || currentPaintHex);
            }

            bar.style.width = '100%';
            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.add('hidden');
                startAutoRotate();
            }, 400);
        },
        (xhr) => {
            if (xhr.total > 0) {
                bar.style.width = Math.round(10 + (xhr.loaded / xhr.total) * 85) + '%';
            }
        },
        (err) => {
            console.warn('[360] GLB load failed:', url, err.message);
            if (onFail) onFail();
        }
    );
}

// ════════════════════════════════════════
//  PROCEDURAL CAR BUILDER
// ════════════════════════════════════════
function buildProceduralCar(car, category, bar) {
    bar.style.width = '40%';
    if (carModel) scene.remove(carModel);
    carModel = new THREE.Group(); bodyMeshes = []; trimMeshes = []; glassMeshes = [];

    const name = (car.name || '').toLowerCase();
    const isGWagon   = name.includes('g63') || name.includes('g-class') || name.includes('g class') || name.includes('g wagon') || name.includes('gwagon');
    const isHypercar = name.includes('bugatti') || name.includes('koenigsegg') || name.includes('pagani') || name.includes('rimac') || name.includes('laferrari') || name.includes('918 spyder');
    const isSUV      = category === 'suv';
    const isLuxury   = category === 'luxury';

    if (isGWagon)        buildGWagon(carModel);
    else if (isHypercar) buildHypercar(carModel);
    else if (isSUV)      buildSUV(carModel);
    else if (isLuxury)   buildLuxurySedan(carModel);
    else                 buildSportsCar(carModel);

    scene.add(carModel);
    applyRealisticPaint(currentPaintHex);
    bar.style.width = '100%';
    setTimeout(() => { document.getElementById('loadingOverlay').classList.add('hidden'); startAutoRotate(); }, 250);
}

// ── Material helpers
function mkBodyMat(hex) {
    const mat = new THREE.MeshStandardMaterial({ color: new THREE.Color(hex), metalness: 0.52, roughness: 0.30, envMapIntensity: 1.5 });
    mat._origColor = new THREE.Color(hex);
    bodyMeshes.push(mat);
    return mat;
}
function chromeMat()  { return new THREE.MeshStandardMaterial({ color: 0xd8d8d8, metalness: 0.98, roughness: 0.04 }); }
function glassMat()   { return new THREE.MeshStandardMaterial({ color: 0x112233, metalness: 0.1, roughness: 0.0, transparent: true, opacity: 0.32 }); }
function rubberMat()  { return new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.0, roughness: 0.92 }); }
function darkMat()    { return new THREE.MeshStandardMaterial({ color: 0x0d0d0d, metalness: 0.05, roughness: 0.88 }); }
function lightMat()   { return new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xddeeff, emissiveIntensity: 0.75 }); }
function tailLightMat(){ return new THREE.MeshStandardMaterial({ color: 0xff2200, emissive: 0xff2200, emissiveIntensity: 0.7 }); }

function addMesh(group, geo, mat, x=0,y=0,z=0,rx=0,ry=0,rz=0,sx=1,sy=1,sz=1) {
    const m = new THREE.Mesh(geo, mat);
    m.position.set(x,y,z); m.rotation.set(rx,ry,rz); m.scale.set(sx,sy,sz);
    m.castShadow = m.receiveShadow = true;
    group.add(m); return m;
}

// ════════════════════════════════════════
//  REALISTIC PAINT APPLICATION
//  Only recolors body panels — preserves
//  all other original textures/materials
// ════════════════════════════════════════
function applyRealisticPaint(hex) {
    if (!hex || !bodyMeshes.length) return;
    currentPaintHex = hex;

    const target = new THREE.Color(hex);
    const hsl    = {};
    target.getHSL(hsl);

    const isDark    = hsl.l < 0.12;
    const isLight   = hsl.l > 0.85;
    const isNeutral = hsl.s < 0.08;

    bodyMeshes.forEach(mat => {
        if (!mat || !mat.color) return;

        // Restore original base colour before applying new paint
        const orig    = mat._origColor
            ? mat._origColor.clone()
            : new THREE.Color(0.45, 0.45, 0.48);
        const origHsl = {};
        orig.getHSL(origHsl);

        if (isDark) {
            // Deep black / dark — keep very dark, slight metallic
            mat.color.lerpColors(orig, target, 0.90);
            mat.metalness = 0.55; mat.roughness = 0.35;
        } else if (isLight) {
            // White / pearl — soft blend
            mat.color.lerpColors(orig, target, 0.60);
            mat.metalness = 0.20; mat.roughness = 0.36;
        } else if (isNeutral) {
            // Silver / grey — high metalness
            const grey = new THREE.Color();
            grey.setHSL(hsl.h, 0.10, origHsl.l * 0.5 + hsl.l * 0.5);
            mat.color.copy(grey);
            mat.metalness = 0.90; mat.roughness = 0.12;
        } else {
            // Coloured paints — vivid, glossy
            const painted = new THREE.Color();
            painted.setHSL(
                hsl.h,
                Math.min(hsl.s * 0.90 + 0.06, 0.98),
                origHsl.l * 0.65 + hsl.l * 0.35
            );
            mat.color.lerpColors(orig, painted, 0.88);
            mat.metalness = 0.58; mat.roughness = 0.22;
        }

        // Keep map/texture if it exists — just tint it
        mat.envMapIntensity = 2.2;
        mat.needsUpdate = true;
    });
}

// ════════════════════════════════════════
//  COLOR SWATCH → applies realistic paint
// ════════════════════════════════════════
function buildColorBar(colors) {
    const bar = document.getElementById('colorBar');
    bar.innerHTML = '<span class="color-bar-label">Colour</span>';
    if (!colors.length) { bar.style.display = 'none'; return; }
    colors.forEach((col, i) => {
        const btn = document.createElement('div');
        btn.className = 'color-swatch-btn' + (i === 0 ? ' active' : '');
        btn.innerHTML = `<div class="swatch-circle" style="background:${col.hex||'#888'}"></div><span class="swatch-name">${col.name||'Option '+(i+1)}</span>`;
        btn.onclick = () => {
            document.querySelectorAll('.color-swatch-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyRealisticPaint(col.hex);
        };
        bar.appendChild(btn);
    });
}
function animate() {
    requestAnimationFrame(animate);

    if (controls.autoRotate && carModel) {
        const theta = Math.atan2(camera.position.x, camera.position.z);
        const deg   = Math.round(((theta * 180 / Math.PI) + 360) % 360);
        document.getElementById('compassNeedle').style.transform = `translateX(-50%) rotate(${deg}deg)`;
        document.getElementById('compassAngle').textContent = deg + '°';
    }

    // ── Sync brand text rotation with car model
    // The text always stays behind the car as it rotates
    if (brandGroup && carModel) {
        // Match car model Y rotation so text spins with it
        brandGroup.rotation.y = carModel.rotation.y;
        // Also orbit with camera azimuth so it's always behind
        const camTheta = Math.atan2(camera.position.x, camera.position.z);
        brandGroup.rotation.y = camTheta + Math.PI; // opposite side from camera = behind car
    }

    controls.update();
    renderer.render(scene, camera);
}

function onResize() {
    const stage = document.getElementById('stage');
    camera.aspect = stage.clientWidth / stage.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(stage.clientWidth, stage.clientHeight);
}

// ════════════════════════════════════════
//  AUTO ROTATE
// ════════════════════════════════════════
function startAutoRotate() {
    isAutoRotating = true;
    controls.autoRotate = true;
    const btn = document.getElementById('autoBtn');
    btn.classList.add('active', 'spinning');
    btn.innerHTML = '<i class="bi bi-pause-circle"></i> Pause';
}
function stopAutoRotate() {
    isAutoRotating = false;
    controls.autoRotate = false;
    const btn = document.getElementById('autoBtn');
    btn.classList.remove('active', 'spinning');
    btn.innerHTML = '<i class="bi bi-play-circle"></i> Auto Rotate';
}
window.toggleAutoRotate = () => isAutoRotating ? stopAutoRotate() : startAutoRotate();
window.setSpeed = v => { controls.autoRotateSpeed = v * 0.55; };

// ════════════════════════════════════════
//  CAMERA PRESETS
// ════════════════════════════════════════
const PRESETS = {
    front: { pos: [0,    3.0,  10.0], target: [0, 1.1, 0] },
    side:  { pos: [10.0, 2.8,   0.5], target: [0, 1.1, 0] },
    rear:  { pos: [0,    3.0, -10.0], target: [0, 1.1, 0] },
    top:   { pos: [1.0,  11.0,  4.5], target: [0, 0.5, 0] },
};
window.gotoPreset = function(name) {
    stopAutoRotate();
    document.getElementById('dragHint').classList.add('hidden');
    const p = PRESETS[name]; if (!p) return;
    const s = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
    const t = { x: controls.target.x,  y: controls.target.y,  z: controls.target.z };
    let step = 0; const dur = 60;
    (function tick() {
        step++;
        const e = 1 - Math.pow(1 - step / dur, 3);
        camera.position.set(s.x+(p.pos[0]-s.x)*e, s.y+(p.pos[1]-s.y)*e, s.z+(p.pos[2]-s.z)*e);
        controls.target.set(t.x+(p.target[0]-t.x)*e, t.y+(p.target[1]-t.y)*e, t.z+(p.target[2]-t.z)*e);
        controls.update();
        if (step < dur) requestAnimationFrame(tick);
    })();
};
window.resetCamera = function() { gotoPreset('front'); setTimeout(startAutoRotate, 1000); };

// ════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════
window.toggleFullscreen = function() {
    const el = document.getElementById('stage');
    if (!document.fullscreenElement) {
        el.requestFullscreen().catch(() => {});
        document.getElementById('fsIcon').className = 'bi bi-fullscreen-exit';
    } else {
        document.exitFullscreen();
        document.getElementById('fsIcon').className = 'bi bi-fullscreen';
    }
};
document.addEventListener('fullscreenchange', onResize);

window.toggleSpecs = function() {
    specsOpen = !specsOpen;
    document.getElementById('specsPanel').classList.toggle('open', specsOpen);
    document.getElementById('btnSpecs').classList.toggle('active', specsOpen);
};

function buildSpecs(c) {
    const rows = [
        ['Engine',       c.engine],
        ['Power',        c.power],
        ['Torque',       c.torque_nm   ? c.torque_nm   + ' Nm'   : null],
        ['0–100 km/h',   c.acceleration? c.acceleration.replace('0-100: ','') : null],
        ['Top Speed',    c.top_speed_kmh ? c.top_speed_kmh + ' km/h' : null],
        ['Transmission', c.transmission],
        ['Drivetrain',   c.drivetrain],
        ['Weight',       c.weight_kg   ? c.weight_kg + ' kg'     : null],
        ['Seats',        c.seats],
        ['Origin',       c.origin],
        ['Year',         c.year],
        ['Fuel',         c.fuel_type],
    ].filter(([,v]) => v);

    document.getElementById('specsList').innerHTML = rows.map(([l,v]) => `
        <div class="spec-row">
            <span class="spec-label">${l}</span>
            <span class="spec-value">${v}</span>
        </div>`).join('');

    const hl = document.getElementById('specHighlights');
    if (c.highlights && c.highlights.length) {
        hl.innerHTML = `<div class="spec-highlights-title">Highlights</div>` +
            c.highlights.map(h => `<span class="highlight-pill">${h}</span>`).join('');
    } else hl.style.display = 'none';
}

// ── Keyboard shortcuts
window.addEventListener('keydown', e => {
    if (e.key==='ArrowLeft')  { controls.autoRotateSpeed=-Math.abs(controls.autoRotateSpeed); if(!isAutoRotating) startAutoRotate(); }
    if (e.key==='ArrowRight') { controls.autoRotateSpeed= Math.abs(controls.autoRotateSpeed); if(!isAutoRotating) startAutoRotate(); }
    if (e.key===' ') { e.preventDefault(); window.toggleAutoRotate(); }
    if (e.key==='f'||e.key==='F') window.toggleFullscreen();
    if (e.key==='s'||e.key==='S') window.toggleSpecs();
});
